# Builds the DocC documentation and deploys it to GitHub Pages.
# See: https://www.swift.org/documentation/docc/

name: Documentation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Least privilege at the top level; the deploy job widens its own scope below.
permissions:
  contents: read

# Allow one concurrent Pages deployment. Do not cancel an in-progress run —
# interrupting actions/deploy-pages mid-deploy can leave Pages inconsistent.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build DocC
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # The package targets the .v26 platforms and uses SwiftSetting.defaultIsolation,
      # which require the Xcode 26 / Swift 6.3 toolchain. Select the newest installed
      # Xcode 26.x with a plain shell step (the local_only Actions policy blocks
      # third-party setup actions such as maxim-lobanov/setup-xcode).
      - name: Select Xcode 26
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
          xcodebuild -version
          swift --version

      # Build for iOS — the single destination that exposes the most public surface
      # (UIKit, GameController, and the cross-platform SwiftUI/Foundation extensions).
      # Note: watchOS-only and tvOS-only symbols (e.g. WKInterfaceDeviceBatteryState,
      # tvOS-specific button styles) are not captured by a single-platform build.
      - name: Build documentation archive
        run: |
          xcodebuild docbuild \
            -scheme SwiftyLoadLetter \
            -destination 'generic/platform=iOS' \
            -derivedDataPath .derivedData

      - name: Transform for static hosting
        run: |
          ARCHIVE=$(find .derivedData -type d -name 'SwiftyLoadLetter.doccarchive' | head -1)
          echo "Using archive: $ARCHIVE"
          "$(xcrun --find docc)" process-archive transform-for-static-hosting "$ARCHIVE" \
            --output-path _site \
            --hosting-base-path SwiftyLoadLetter
          # Redirect the site root to the documentation landing page.
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=documentation/swiftyloadletter/"></head></html>' > _site/index.html

      # Only the deploy path needs the artifact; skip the upload on PR validation runs.
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    # Build runs on every trigger (so PRs validate the docs build); deploy only
    # publishes from main and manual dispatch, never from pull requests.
    if: github.event_name != 'pull_request'
    needs: build
    # Deploy-only privileges, scoped to this job rather than the whole workflow.
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
